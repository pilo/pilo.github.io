remote_theme: mmistakes/minimal-mistakes

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

# --- Site identity ---
title: "Pilo's Procurements Tools Portfolio"
subtitle: "f&b procurement journey"
name: "Pilo"
description: "F&B procurements tools and resources"
url: "https://pilo.github.io"
baseurl: ""   # leave empty for a user site (yourusername.github.io)
              # set to "/repo-name" for a project site

# --- Skin (visual style) ---
# Options: default | air | aqua | contrast | dark | mint | plum | sunrise
minimal_mistakes_skin: "sunrise"

# --- Author sidebar ---
author:
  name: "Pilo"
  bio: "F&B Procurement, Ops, AI"
  location: "Monaco"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/pilo"
    - label: "Linkedin"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/riccardo-pili-82686040a/"
    - label: "E-Mail"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:riccardo.pili@gmail.com"

# --- Tell Jekyll to build files inside _pages ---
include:
  - _pages

# --- Default layouts ---
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
