
<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">

    {% include head-custom.html %}
  </head>

  <body>
    <div class="wrapper">
      <header>
        <h1><a href="{{ "/" | absolute_url }}">{{ site.title }}</a></h1>
        
        {% if site.description %}
        <p class="description">{{ site.description }}</p>
        {% endif %}

        <!-- Navigation bar -->
        <nav class="navigation" style="margin-top: 15px;">
          <a href="{{ "/" | absolute_url }}" style="margin-right: 15px; text-decoration: none; color: inherit;">Home</a>
          <a href="{{ "/about.html" | absolute_url }}" style="margin-right: 15px; text-decoration: none; color: inherit;">About</a>
          <a href="{{ "/projects.html" | absolute_url }}" style="text-decoration: none; color: inherit;">Projects</a>
        </nav>

        {% if page.url != "/" %}
        <nav style="margin-top: 20px;">
          <a href="{{ "/" | absolute_url }}" style="float: right; text-decoration: none;">← Home</a>
        </nav>
        {% endif %}
      </header>

      <section>
        {{ content }}
      </section>

      <footer>
        <p>Powered by <a href="https://pages.github.com">GitHub Pages</a></p>
      </footer>
    </div>

    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
  </body>
</html>
